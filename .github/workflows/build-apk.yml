name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Auto Bump Version
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('app.json'));
            data.expo.android.versionCode = ${{ github.run_number }};
            data.expo.version = '1.1.${{ github.run_number }}';
            fs.writeFileSync('app.json', JSON.stringify(data, null, 2));
            console.log('v' + data.expo.version + ' (code: ' + data.expo.android.versionCode + ')');
          "

      - name: Prebuild
        run: npx expo prebuild --platform android --clean --no-install

      - name: Configure APK Signing
        run: |
          echo "KEY_ALIAS=${{ secrets.ANDROID_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_STORE_PASS=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_PASS=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_BASE64=${{ secrets.ANDROID_SIGNING_KEY }}" >> $GITHUB_ENV

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease

      - name: List SDK build tools
        run: ls /usr/local/lib/android/sdk/build-tools/

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ env.KEY_BASE64 }}
          alias: ${{ env.KEY_ALIAS }}
          keyStorePassword: ${{ env.KEY_STORE_PASS }}
          keyPassword: ${{ env.KEY_PASS }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 5

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.1.${{ github.run_number }}
          release_name: Unraid v1.1.${{ github.run_number }}
          body: "APK Build - 修复播放按钮错位和闪退问题"
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          asset_name: unraid-v1.1.${{ github.run_number }}.apk
          asset_content_type: application/vnd.android.package-archive
