name: Build Android APK
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Auto Bump Version
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('app.json'));
            data.expo.android.versionCode = ${{ github.run_number }};
            data.expo.version = '1.1.${{ github.run_number }}';
            fs.writeFileSync('app.json', JSON.stringify(data, null, 2));
            console.log('v' + data.expo.version + ' (code: ' + data.expo.android.versionCode + ')');
          "

      - name: Prebuild
        run: npx expo prebuild --platform android --clean --no-install

      - name: Configure APK Signing
        run: |
          echo "KEY_ALIAS=unraid_alias" >> $GITHUB_ENV
          echo "KEY_STORE_PASS=UnraidApp2024!" >> $GITHUB_ENV
          echo "KEY_PASS=UnraidApp2024!" >> $GITHUB_ENV
          echo "KEY_" >> $GITHUB_ENV

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease

      - name: List SDK build tools
        run: ls /usr/local/lib/android/sdk/build-tools/

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ env.KEY_BASE64 }}
          alias: ${{ env.KEY_ALIAS }}
          keyStorePassword: ${{ env.KEY_STORE_PASS }}
          keyPassword: ${{ env.KEY_PASS }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-apk
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          tag_name: v1.1.${{ github.run_number }}
          name: "Unraid v1.1.${{ github.run_number }} - 影音中心焕新"
          body: |
            ## 更新内容

            ### 🎬 影音板块全面重写
            - 从 WebDAV 切换为 **Emby 直连**，支持用户名/密码登录
            - 全新简洁网格布局，3列海报展示
            - 继续观看、搜索、排序（名称/年份/评分/添加时间）
            - 无限滚动分页，下拉刷新
            - 剧集支持季度选择器

            ### 🎯 详情页优化
            - 毛玻璃背景 + 海报展示
            - 类型标签、相似推荐
            - 剧集模式：季度折叠 → 展开集列表
            - 播放进度上报 Emby，跨设备同步

            ### ⚙️ 其他
            - 版本号进入 1.1.x 时代
            - 性能优化与稳定性改进
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}