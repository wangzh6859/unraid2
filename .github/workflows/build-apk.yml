name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      # 【关键修复】：必须先修改 app.json 里的版本号！
      - name: Auto Bump Version Code
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('app.json'));
            data.expo.android.versionCode = ${{ github.run_number }};
            data.expo.version = '1.1.${{ github.run_number }}';
            fs.writeFileSync('app.json', JSON.stringify(data, null, 2));
            console.log('✅ 版本号已自动更新为: v' + data.expo.version + ' (Code: ' + data.expo.android.versionCode + ')');
          "

      # 【关键修复】：然后再生成原生代码！这样系统才会把刚才改好的新版本号写进安卓底层去！
      - name: Generate Native Code (Prebuild)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build Android Release
        run: cd android && ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload to Releases
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          tag_name: v1.1.${{ github.run_number }}
          name: "Unraid v1.1.${{ github.run_number }} - 影音中心焕新"
          body: |
            ## 更新内容

            ### 🎬 影音板块全面重写
            - 从 WebDAV 切换为 **Emby 直连**，支持用户名/密码登录
            - 全新简洁网格布局，3列海报展示
            - 继续观看、搜索、排序（名称/年份/评分/添加时间）
            - 无限滚动分页，下拉刷新
            - 剧集支持季度选择器

            ### 🎯 详情页优化
            - 毛玻璃背景 + 海报展示
            - 类型标签、相似推荐
            - 剧集模式：季度折叠 → 展开集列表
            - 播放进度上报 Emby，跨设备同步

            ### ⚙️ 其他
            - 版本号进入 1.1.x 时代
            - 性能优化与稳定性改进
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}